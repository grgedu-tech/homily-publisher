<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Homily Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cormorant Garamond',Georgia,serif;background:#FAF8F4;color:#1C1C1C;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 3rem;border-bottom:1px solid #E4DFD6;background:#FAF8F4}
.brand{font-size:1.1rem;font-weight:500;letter-spacing:.02em}
.brand em{color:#B8872A;font-style:normal}
.site-link{font-family:'Cormorant Garamond',Georgia,serif;font-size:.78rem;color:#aaa;letter-spacing:.07em;text-transform:uppercase;text-decoration:none}
.site-link:hover{color:#B8872A}
main{max-width:700px;margin:0 auto;padding:3.5rem 2rem 5rem}
.pin-gate{max-width:320px;margin:8rem auto;text-align:center}
.pin-gate h2{font-size:1.6rem;font-weight:400;margin-bottom:.35rem}
.pin-gate p{font-size:.82rem;color:#aaa;margin-bottom:2rem}
.pin-input{display:block;width:160px;margin:0 auto 1rem;text-align:center;font-family:'Cormorant Garamond',Georgia,serif;font-size:1.8rem;letter-spacing:.4em;padding:.5rem;border:1px solid #DDD8D0;border-radius:4px;background:#fff}
.pin-input:focus{outline:none;border-color:#B8872A}
.pin-error{font-size:.8rem;color:#c0392b;min-height:1.2em;margin-bottom:.75rem}
.btn-gold{background:#B8872A;color:#fff;border:none;cursor:pointer;font-family:'Cormorant Garamond',Georgia,serif;font-size:.9rem;letter-spacing:.06em;padding:.6rem 2rem;border-radius:4px}
.btn-gold:hover{background:#a37625}
.form-hidden{display:none}
.section-lbl{font-size:.68rem;color:#B8872A;letter-spacing:.14em;text-transform:uppercase;margin-bottom:1.75rem}
.field-label{display:block;font-size:.7rem;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem}
.date-field{display:block;font-family:'Cormorant Garamond',Georgia,serif;font-size:1rem;padding:.55rem .8rem;border:1px solid #DDD8D0;background:#fff;color:#1C1C1C;border-radius:4px;margin-bottom:2.5rem;width:230px}
.date-field:focus{outline:none;border-color:#B8872A}
.lang-block{margin-bottom:2rem}
.lang-block-head{font-size:.68rem;color:#B8872A;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.6rem;padding-bottom:.5rem;border-bottom:1px solid #E4DFD6}
.paste-area{display:block;width:100%;min-height:400px;font-family:'Courier New',Courier,monospace;font-size:.88rem;line-height:1.75;padding:1.25rem;border:1px solid #DDD8D0;background:#fff;color:#1C1C1C;resize:vertical;border-radius:4px}
.paste-area:focus{outline:none;border-color:#B8872A}
.paste-area::placeholder{color:#ccc}
.form-actions{display:flex;align-items:center;gap:1.25rem;margin-top:1.5rem}
.status{font-size:.88rem;color:#aaa}
.status.ok{color:#B8872A}
.status.err{color:#c0392b}
</style>
</head>
<body>
